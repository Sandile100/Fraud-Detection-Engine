spring:
  application:
    name: fraud-engine

  config:
    import: classpath:fraud-rules.yml

  datasource:
    url: jdbc:postgresql://localhost:5432/frauddb
    username: fraud
    password: fraud
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

server:
  port: 8080

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: INFO