spring:
  config:
    import: classpath:fraud-rules.yml

  datasource:
    url: jdbc:h2:mem:frauddb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    consumer:
      auto-offset-reset: earliest
      group-id: fraud-engine-test-group
      properties:
        spring.json.trusted.packages: "*"
    producer:
      properties:
        spring.json.add.type.headers: false

  app:
    kafka:
      topics:
        transactions: fraud.transactions.v1

logging:
  level:
    root: WARN
    org.flywaydb: DEBUG