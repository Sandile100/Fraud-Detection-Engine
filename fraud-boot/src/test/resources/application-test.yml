spring:
  datasource:
    url: jdbc:h2:mem:frauddb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  kafka:
    consumer:
      auto-offset-reset: earliest
      group-id: fraud-engine-test-group
      properties:
        spring.json.trusted.packages: "*"
    producer:
      properties:
        spring.json.add.type.headers: false

management:
  otlp:
    metrics:
      export:
        enabled: false

app:
  kafka:
    topics:
      transactions: fraud.transactions.v1