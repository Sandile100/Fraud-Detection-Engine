version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: fraud-postgres
    environment:
      POSTGRES_DB: frauddb
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud -d frauddb"]
      interval: 10s
      timeout: 5s
      retries: 5

  fraud-engine:
    build: .
    container_name: fraud-engine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/frauddb
      SPRING_DATASOURCE_USERNAME: fraud
      SPRING_DATASOURCE_PASSWORD: fraud
    ports:
      - "8080:8080"